name: pages

# Build the showcase from showcase/ and deploy it to THIS repo's GitHub Pages.
#
# Guarded to the PUBLIC repo: the same file is synced into the private mirror,
# where the job is skipped (no Pages there).

on:
  push:
    branches: [master]
    paths:
      - showcase/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # Only run on the public toolkit repo. In the private mirror this is skipped.
    if: github.repository == 'hieubui2409/human-analyzer'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build the showcase (stdlib only)
        run: python3 showcase/build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: showcase

      - name: Deploy to human-analyzer Pages
        id: deployment
        uses: actions/deploy-pages@v4
